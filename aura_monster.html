<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA MONSTER</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090e;
  --bg2: #101018;
  --bg3: #181825;
  --purple: #6e4fc4;
  --purple-bright: #a67fff;
  --gold: #f0b429;
  --gold-dim: #7a5d0e;
  --red: #e83535;
  --red-dim: #7a1c1c;
  --text: #ddddf0;
  --muted: #55556e;
  --border: #222235;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow-x:hidden; }
.scanlines { position:fixed; inset:0; pointer-events:none; z-index:1000; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px); }
.popup-layer { position:fixed; inset:0; pointer-events:none; z-index:998; }
.popup { position:absolute; font-family:'Black Han Sans',sans-serif; font-size:32px; pointer-events:none; animation:popUp 1.6s ease forwards; }
.popup.gain { color:var(--purple-bright); }
.popup.lose { color:var(--red); }
.popup.huge { font-size:50px; color:var(--gold); }
@keyframes popUp { 0%{opacity:1;transform:translateY(0) scale(0.6)} 20%{transform:translateY(-24px) scale(1.25)} 65%{opacity:1;transform:translateY(-70px) scale(1)} 100%{opacity:0;transform:translateY(-110px) scale(0.85)} }
.wrap { max-width:660px; margin:0 auto; padding:16px 20px 60px; }
.hdr { text-align:center; padding:28px 0 16px; }
.hdr-title { font-family:'Black Han Sans',sans-serif; font-size:58px; letter-spacing:5px; color:var(--purple-bright); line-height:1; animation:flicker 9s infinite; }
@keyframes flicker { 0%,91%,95%,100%{opacity:1} 93%{opacity:0.6} 94%{opacity:0.9} }
.hdr-sub { font-size:10px; letter-spacing:6px; color:var(--muted); text-transform:uppercase; margin-top:5px; }
.aura-box { background:var(--bg2); border:1px solid var(--border); border-top:2px solid var(--purple); border-radius:4px; padding:20px 24px 16px; margin:16px 0; text-align:center; transition:border-top-color 0.4s; }
.aura-box.neg { border-top-color:var(--red); }
.aura-box.elite { border-top-color:var(--gold); }
.aura-label { font-size:9px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
.aura-num { font-family:'Black Han Sans',sans-serif; font-size:76px; line-height:1; color:var(--purple-bright); transition:color 0.3s; }
.aura-num.neg { color:var(--red); }
.aura-num.elite { color:var(--gold); }
.aura-rank { font-size:12px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-top:7px; transition:color 0.3s; }
.prog-wrap { height:3px; background:var(--bg3); border-radius:2px; margin-top:14px; overflow:hidden; }
.prog-bar { height:100%; border-radius:2px; background:var(--purple); transition:width 0.5s ease,background 0.3s; }
.prog-bar.neg { background:var(--red); }
.prog-bar.elite { background:var(--gold); }
.stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:12px 0; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:10px; text-align:center; }
.stat-val { font-family:'Black Han Sans',sans-serif; font-size:22px; color:var(--purple-bright); }
.stat-lbl { font-size:8px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:2px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:26px; margin:14px 0; transition:border-color 0.4s; }
.card.stairs-card { border-color:var(--gold); animation:goldPulse 2s infinite; }
@keyframes goldPulse { 0%,100%{border-color:var(--gold)} 50%{border-color:var(--gold-dim)} }
.card-tag { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
.card-tag.gold { color:var(--gold); font-size:11px; letter-spacing:5px; }
.card-text { font-size:15px; line-height:1.8; color:var(--text); margin-bottom:22px; }
.card-text strong { color:var(--purple-bright); }
.choices { display:grid; gap:8px; grid-template-columns:1fr 1fr; }
@media(max-width:500px) { .choices { grid-template-columns:1fr; } }
.choice { background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:13px 16px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:13px; cursor:pointer; text-align:left; transition:all 0.15s; }
.choice:hover { border-color:var(--purple); background:#1c1c2c; transform:translateX(3px); }
.choice:active { transform:translateX(1px) scale(0.99); }
.choice.sc { border-color:var(--gold-dim); }
.choice.sc:hover { border-color:var(--gold); background:#1a1500; }
.choice-lbl { font-size:8px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; display:block; margin-bottom:4px; }
.result { display:none; background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:24px; margin:14px 0; text-align:center; animation:fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
.result.show { display:block; }
.r-verdict { font-family:'Black Han Sans',sans-serif; font-size:30px; margin-bottom:6px; }
.r-verdict.s { color:var(--purple-bright); }
.r-verdict.c { color:var(--red); }
.r-verdict.g { color:var(--gold); }
.r-delta { font-size:14px; margin-bottom:6px; }
.r-flavor { font-size:13px; color:var(--muted); font-style:italic; margin-bottom:20px; line-height:1.7; }
.next-btn { background:var(--purple); border:none; border-radius:4px; color:#fff; font-family:'Black Han Sans',sans-serif; font-size:15px; letter-spacing:2px; padding:11px 30px; cursor:pointer; transition:all 0.15s; }
.next-btn:hover { background:var(--purple-bright); transform:scale(1.04); }
.next-btn:active { transform:scale(0.97); }
.stairs-seq { display:none; }
.stairs-seq.show { display:block; }
.stairs-block { padding:28px; background:var(--bg2); border:1px solid var(--border); border-radius:4px; margin:14px 0; }
.sl { font-size:15px; line-height:2; color:var(--text); opacity:0; transform:translateY(6px); transition:opacity 0.7s ease,transform 0.7s ease; display:block; margin-bottom:2px; }
.sl.vis { opacity:1; transform:translateY(0); }
.sl.em { color:var(--gold); font-size:17px; }
.sl.red { color:var(--red); }
.sl.pur { color:var(--purple-bright); font-style:italic; }
.sl.big { font-family:'Black Han Sans',sans-serif; font-size:24px; letter-spacing:2px; color:var(--gold); }
.sl.sm { font-size:12px; letter-spacing:1px; color:var(--muted); font-style:italic; }
.end { display:none; background:var(--bg2); border:1px solid var(--gold); border-radius:4px; padding:44px 32px; margin:14px 0; text-align:center; }
.end.show { display:block; }
.end.bad { border-color:var(--red); }
.end-title { font-family:'Black Han Sans',sans-serif; font-size:52px; color:var(--gold); letter-spacing:4px; animation:breathe 2.5s infinite; }
.end.bad .end-title { color:var(--red); animation:none; }
@keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.end-art { font-family:monospace; font-size:12px; line-height:1.5; margin:18px 0; color:var(--purple-bright); }
.end-sub { font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:20px; }
.end-stats { font-size:15px; line-height:2.2; color:var(--text); margin-bottom:28px; }
.restart { background:transparent; border:1px solid var(--gold); border-radius:4px; color:var(--gold); font-family:'Black Han Sans',sans-serif; font-size:15px; letter-spacing:2px; padding:11px 30px; cursor:pointer; transition:all 0.15s; }
.restart:hover { background:var(--gold); color:var(--bg); }
.end.bad .restart { border-color:var(--red); color:var(--red); }
.end.bad .restart:hover { background:var(--red); color:var(--bg); }
.ticker { font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; text-align:center; margin-top:28px; padding-top:18px; border-top:1px solid var(--border); }
.shake { animation:shk 0.4s ease; }
@keyframes shk { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="popup-layer" id="popupLayer"></div>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-title">AURA MONSTER</div>
    <div class="hdr-sub">sigma aura farming simulator · re:zero edition</div>
  </div>
  <div class="aura-box" id="auraBox">
    <div class="aura-label">aura points</div>
    <div class="aura-num" id="auraNum">0</div>
    <div class="aura-rank" id="auraRank">⊹ AURA PEASANT ⊹</div>
    <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:3%"></div></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="stRound">1</div><div class="stat-lbl">round</div></div>
    <div class="stat"><div class="stat-val" id="stSigma">0</div><div class="stat-lbl">mosse sigma</div></div>
    <div class="stat"><div class="stat-val" id="stCringe">0</div><div class="stat-lbl">fallimenti</div></div>
  </div>
  <div class="card" id="mainCard">
    <div class="card-tag" id="cardTag">— SITUAZIONE —</div>
    <div class="card-text" id="cardText"></div>
    <div class="choices" id="choicesBox"></div>
  </div>
  <div class="result" id="resultBox">
    <div class="r-verdict" id="rVerdict"></div>
    <div class="r-delta" id="rDelta"></div>
    <div class="r-flavor" id="rFlavor"></div>
    <button class="next-btn" onclick="nextRound()">PROSSIMA SITUAZIONE →</button>
  </div>
  <div class="stairs-seq" id="stairsSeq">
    <div class="stairs-block" id="stairsBlock"></div>
  </div>
  <div class="end" id="endScreen">
    <div class="end-title" id="endTitle"></div>
    <div class="end-art" id="endArt"></div>
    <div class="end-sub" id="endSub"></div>
    <div class="end-stats" id="endStats"></div>
    <button class="restart" onclick="restart()">↺ RICOMINCIA</button>
  </div>
  <div class="ticker">✦ FARM YOUR AURA ✦ NO CRINGE ALLOWED ✦ SUBARU APPROVED ✦ LE SCALE ASPETTANO ✦ SIGMA ONLY ✦</div>
</div>

<script>

  {min:-Infinity,max:-6000,label:"☠ NPC ASSOLUTO ☠",cls:"neg"},
  {min:-6000,max:-2000,label:"▼ CRINGE TOTALE ▼",cls:"neg"},
  {min:-2000,max:0,label:"⚠ AURA NEGATIVA ⚠",cls:"neg"},
  {min:0,max:1500,label:"⊹ AURA PEASANT ⊹",cls:""},
  {min:1500,max:4000,label:"◈ AURA APPRENTICE ◈",cls:""},

  {min:8000,max:13000,label:"✦ AURA LORD ✦",cls:""},
  {min:13000,max:20000,label:"⬡ AURA OVERLORD ⬡",cls:"elite"},
  {min:20000,max:Infinity,label:"⚡ AURA MONSTER ⚡",cls:"elite"}
];

const POOL=[
  {tag:"— SITUAZIONE SOCIALE —",text:'Sei al bar. La persona davanti a te prende <strong>l\'ultimo cornetto</strong> guardandoti in faccia.',
   choices:[
    {text:"La fissi per 5 secondi interi, poi ordini un caffè come se niente fosse",sigma:true,aura:1400,verdict:"SIGMA",flavor:"Non hai detto una parola. Non ne avevi bisogno."},
    {text:"Sospiri così forte che tutti lo sentono, poi ordini acqua liscia",sigma:true,aura:800,verdict:"SIGMA PASSIVO",flavor:"Il sospiro parlava per te. Eloquente."},
    {text:"Sorridi e dici 'buon appetito!' con un pollice su",sigma:false,aura:-600,verdict:"NPC",flavor:"Il sorriso era falso. Lo sapeva anche lui."},
    {text:"Chiedi al barista se ne ha altri, già sapendo la risposta",sigma:false,aura:-400,verdict:"CRINGE",flavor:"Hai creato imbarazzo per niente. Classico."}

  {tag:"— SITUAZIONE COMUNICATIVA —",text:'Il tuo amico manda nel gruppo: <strong>"okay"</strong>. Solo quello. Nessun contesto.',

    {text:"Non rispondi. Per tre giorni.",sigma:true,aura:900,verdict:"SIGMA",flavor:"Lui sa cosa ha fatto. Entrambi lo sapete."},
    {text:"Metti solo 👍 e sparisci dal gruppo per ore",sigma:true,aura:600,verdict:"FREDDO",flavor:"Un pollice. Un'era glaciale."},
    {text:"Rispondi 'tutto bene?? cos'è successo??' con tre punti interrogativi",sigma:false,aura:-700,verdict:"NPC",flavor:"Hai dimostrato di aver bisogno di contesto. Imbarazzante."},
    {text:"Chiami direttamente per capire cosa intendesse",sigma:false,aura:-500,verdict:"CRINGE",flavor:"Si chiama con un messaggio ambiguo? No. Mai."}
  ]},
  {tag:"— SITUAZIONE GASTRONOMICA —",text:'Cammini per strada, cadi, e <strong>lasci cadere la pizza</strong>. C\'è gente intorno.',
   choices:[

    {text:"Dici 'vabbè' ad alta voce e ordini subito un'altra su Deliveroo",sigma:false,aura:-400,verdict:"NPC",flavor:"Hai speso 4€ di delivery fee per nascondere l'imbarazzo."}

  {tag:"— SITUAZIONE LAVORATIVA —",text:'Il tuo capo ti manda una mail: <strong>"ci sentiamo"</strong>. Nessuna ora. Nessun giorno.',
   choices:[
    {text:"Non rispondi. Lavori come se niente fosse. Sa dove trovarti.",sigma:true,aura:1500,verdict:"SIGMA",flavor:"Tu non corri dietro all'ambiguità. L'ambiguità corre da te."},
    {text:"Rispondi solo 'ok' con la O minuscola",sigma:true,aura:900,verdict:"FREDDO",flavor:"Due lettere. Zero ansia trasmessa."},

  ]},
  {tag:"— SITUAZIONE ROMANTICA —",text:'Una persona che ti piace ti scrive: <strong>"che fai stasera?"</strong>',

    {text:"Aspetti 40 minuti. Rispondi 'niente di che, tu?'",sigma:true,aura:1200,verdict:"SIGMA",flavor:"Calibrato. Rilassato. Perfetto."},
    {text:"Rispondi in 12 secondi: 'Niente dai, sono liberoooo!! Perché?? 😊'",sigma:false,aura:-1100,verdict:"NPC ROMANTICO",flavor:"Le emoji parlano. Hai detto troppo."},

    {text:"Ti scusi mille volte cercando contanti sudando",sigma:false,aura:-700,verdict:"NPC FINANZIARIO",flavor:"La fila ti ha giudicato. Anche il bambino di 4 anni."},
    {text:"Dici 'vabbè lascio tutto' e esci senza comprare niente",sigma:false,aura:-500,verdict:"RESA TOTALE",flavor:"Hai lasciato la spesa. La spesa non tornerà da te."}

    {text:"Scrivi la cosa su un foglio. La bruci mentalmente. Dormi.",sigma:true,aura:1400,verdict:"RITUALE",flavor:"Il rituale non era necessario. Ma era sigma farlo comunque."},
    {text:"Ti rigiri nel letto per 3 ore in agonia pura",sigma:false,aura:-1500,verdict:"NPC ESISTENZIALE",flavor:"Il 2016 ti sta vivendo affitto gratis nella testa."},

    {text:"Sorridi appena con un angolo della bocca. Torni a quello che facevi.",sigma:true,aura:2500,verdict:"FREDDO SIGMA",flavor:"Il mezzo sorriso era un'intera frase."},

let gs={aura:0,round:1,sigma:0,cringe:0,queue:[],gameOver:false};

function buildQueue(){
  const normal=POOL.filter(s=>!s.isStairs);
  const stairs=POOL.find(s=>s.isStairs);
  const shuffled=normal.sort(()=>Math.random()-0.5).slice(0,15);
  return [...shuffled,stairs];
}

function getRank(a){return RANKS.find(r=>a>=r.min&&a<r.max)||RANKS[RANKS.length-1];}

function updateHUD(){
  const r=getRank(gs.aura);
  document.getElementById('auraNum').textContent=gs.aura.toLocaleString('it-IT');
  document.getElementById('auraNum').className='aura-num '+(r.cls||'');
  document.getElementById('auraRank').textContent=r.label;
  document.getElementById('auraRank').style.color=r.cls==='elite'?'var(--gold)':r.cls==='neg'?'var(--red)':'var(--purple-bright)';
  const box=document.getElementById('auraBox');
  box.className='aura-box '+(r.cls||'');
  const pct=Math.min(100,Math.max(2,(gs.aura/20000)*100));
  const bar=document.getElementById('progBar');
  bar.style.width=pct+'%';
  bar.className='prog-bar '+(r.cls||'');
  document.getElementById('stRound').textContent=gs.round;
  document.getElementById('stSigma').textContent=gs.sigma;
  document.getElementById('stCringe').textContent=gs.cringe;
}

function spawnPopup(text,cls,x,y){
  const el=document.createElement('div');
  el.className='popup '+cls;
  el.textContent=text;
  el.style.left=x+'px';
  el.style.top=y+'px';
  document.getElementById('popupLayer').appendChild(el);
  setTimeout(()=>el.remove(),1700);
}

function showScenario(s){
  document.getElementById('resultBox').className='result';
  document.getElementById('stairsSeq').className='stairs-seq';
  const card=document.getElementById('mainCard');
  card.style.display='';
  card.className=s.isStairs?'card stairs-card':'card';
  const tag=document.getElementById('cardTag');
  tag.textContent=s.tag;
  tag.className=s.isStairs?'card-tag gold':'card-tag';
  document.getElementById('cardText').innerHTML=s.text.replace(/\n/g,'<br>');
  const box=document.getElementById('choicesBox');
  box.innerHTML='';
  const mixed=[...s.choices].sort(()=>Math.random()-0.5);
  mixed.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice'+(s.isStairs?' sc':'');
    btn.innerHTML=`<span class="choice-lbl">Scelta ${String.fromCharCode(65+i)}</span>${c.text}`;
    btn.onclick=(e)=>pick(c,e);
    box.appendChild(btn);
  });
}

async function pick(choice,e){
  document.getElementById('choicesBox').innerHTML='';
  const rect=e.currentTarget.getBoundingClientRect();
  const px=rect.left+rect.width/2;
  const py=rect.top;
  if(choice.sigma){
    gs.sigma++;
    spawnPopup('+'+choice.aura.toLocaleString('it-IT'),choice.aura>5000?'huge':'gain',px,py);
  }else{
    gs.cringe++;
    spawnPopup(choice.aura.toLocaleString('it-IT'),'lose',px,py);
  }
  gs.aura+=choice.aura;
  updateHUD();
  if(choice.isWin){
    document.getElementById('mainCard').style.display='none';
    await runStairs(true);
    showEnd(true);
    return;
  }
  if(!choice.sigma&&choice.aura<=-2000){
    document.getElementById('auraBox').classList.add('shake');
    setTimeout(()=>document.getElementById('auraBox').classList.remove('shake'),500);
  }
  if(gs.aura<=-9000){showEnd(false);return;}
  if(choice.isStairs&&!choice.isWin){
    document.getElementById('mainCard').style.display='none';
    await runStairs(false);
    showEnd(false);
    return;
  }
  showResult(choice);
}

function showResult(choice){
  const box=document.getElementById('resultBox');
  const v=document.getElementById('rVerdict');
  v.textContent=choice.verdict;
  v.className='r-verdict '+(choice.sigma?(choice.aura>5000?'g':'s'):'c');
  const delta=document.getElementById('rDelta');
  delta.textContent=(choice.aura>=0?'+':'')+choice.aura.toLocaleString('it-IT')+' aura';
  delta.style.color=choice.aura>=0?'var(--purple-bright)':'var(--red)';
  document.getElementById('rFlavor').textContent='"'+choice.flavor+'"';
  box.className='result show';
}

function nextRound(){
  gs.round++;
  gs.queue.shift();
  if(gs.queue.length===0){showEnd(gs.aura>0);return;}
  showScenario(gs.queue[0]);
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

function showEnd(won){
  document.getElementById('stairsSeq').className='stairs-seq';
  document.getElementById('mainCard').style.display='none';
  document.getElementById('resultBox').className='result';
  const end=document.getElementById('endScreen');
  end.className=won?'end show':'end show bad';
  if(won){
    document.getElementById('endTitle').textContent='AURA MONSTER';
    document.getElementById('endArt').innerHTML='⚡ &nbsp;&nbsp;&nbsp; ⚡<br>( ◣_◢ )<br>&nbsp;|████|<br>/|████|\\<br>&nbsp;SIGMA';
    document.getElementById('endSub').textContent='hai raggiunto il picco dell\'aura umana';
  }else{
    document.getElementById('endTitle').textContent='AURA MORTA';
    document.getElementById('endArt').innerHTML='( ×_× )<br>&nbsp;|____|<br>game over';
    document.getElementById('endSub').textContent='la tua aura non esiste più';
  }
  document.getElementById('endStats').innerHTML=
    `Aura finale: <span style="color:${won?'var(--gold)':'var(--red)'}">${gs.aura.toLocaleString('it-IT')}</span><br>`+
    `Mosse sigma: <span style="color:var(--purple-bright)">${gs.sigma}</span> &nbsp;|&nbsp; `+
    `Fallimenti: <span style="color:var(--red)">${gs.cringe}</span><br>`+
    `<br><em style="font-size:12px;color:var(--muted)">${won
      ? 'Le scale non ti hanno fermato. L\'aura parlava per te.'
      : 'Nessuno ricorderà il tuo nome. Letteralmente nessuno.'
    }</em>`;
}

function restart(){
  gs={aura:0,round:1,sigma:0,cringe:0,queue:buildQueue(),gameOver:false};
  document.getElementById('endScreen').className='end';
  document.getElementById('mainCard').style.display='';
  updateHUD();
