<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA MONSTER</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090e;
  --bg2: #101018;
  --bg3: #181825;
  --purple: #6e4fc4;
  --pb: #a67fff;
  --gold: #f0b429;
  --goldd: #7a5d0e;
  --red: #e83535;
  --redd: #7a1c1c;
  --text: #ddddf0;
  --muted: #55556e;
  --border: #222235;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1000;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}
.pop-layer{position:fixed;inset:0;pointer-events:none;z-index:998;}
.pop{position:absolute;font-family:'Black Han Sans',sans-serif;font-size:32px;pointer-events:none;animation:pu 1.6s ease forwards;}
.pop.g{color:var(--pb)}.pop.l{color:var(--red)}.pop.h{font-size:50px;color:var(--gold);}
@keyframes pu{0%{opacity:1;transform:translateY(0) scale(.6)}20%{transform:translateY(-24px) scale(1.25)}65%{opacity:1;transform:translateY(-70px) scale(1)}100%{opacity:0;transform:translateY(-110px) scale(.85)}}

/* AUDIO PLAYER */
.audio-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:rgba(10,10,20,0.95);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  backdrop-filter:blur(8px);
}
.audio-bar button{
  background:none;border:1px solid var(--border);border-radius:3px;
  color:var(--muted);font-size:12px;padding:4px 10px;cursor:pointer;
  font-family:'Black Han Sans',sans-serif;letter-spacing:1px;
  transition:all .15s;
}
.audio-bar button:hover{border-color:var(--pb);color:var(--pb);}
.audio-bar button.active{border-color:var(--pb);color:var(--pb);}
.audio-info{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;flex:1;}
.vol-wrap{display:flex;align-items:center;gap:6px;}
.vol-lbl{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
input[type=range]{
  -webkit-appearance:none;width:80px;height:3px;
  background:var(--border);border-radius:2px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--pb);cursor:pointer;
}

.wrap{max-width:660px;margin:0 auto;padding:16px 20px 90px;}

.hdr{text-align:center;padding:28px 0 16px;}
.hdr-t{font-family:'Black Han Sans',sans-serif;font-size:58px;letter-spacing:5px;color:var(--pb);line-height:1;animation:flk 9s infinite;}
@keyframes flk{0%,91%,95%,100%{opacity:1}93%{opacity:.6}94%{opacity:.9}}
.hdr-s{font-size:10px;letter-spacing:6px;color:var(--muted);text-transform:uppercase;margin-top:5px;}

.aura-box{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--purple);border-radius:4px;padding:20px 24px 16px;margin:16px 0;text-align:center;transition:border-top-color .4s;}
.aura-box.neg{border-top-color:var(--red)}.aura-box.elite{border-top-color:var(--gold)}
.a-lbl{font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.a-num{font-family:'Black Han Sans',sans-serif;font-size:76px;line-height:1;color:var(--pb);transition:color .3s;}
.a-num.neg{color:var(--red)}.a-num.elite{color:var(--gold)}
.a-rank{font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:7px;transition:color .3s;}
.prog-w{height:3px;background:var(--bg3);border-radius:2px;margin-top:14px;overflow:hidden;}
.prog-b{height:100%;border-radius:2px;background:var(--purple);transition:width .5s ease,background .3s;}
.prog-b.neg{background:var(--red)}.prog-b.elite{background:var(--gold)}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center;}
.sv{font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--pb);}
.sl2{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:26px;margin:14px 0;transition:border-color .4s;}
.card.sc{border-color:var(--gold);animation:gp 2s infinite;}
@keyframes gp{0%,100%{border-color:var(--gold)}50%{border-color:var(--goldd)}}
.c-tag{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.c-tag.gold{color:var(--gold);font-size:11px;letter-spacing:5px;}
.c-txt{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:22px;}
.c-txt strong{color:var(--pb);}

.choices{display:grid;gap:8px;grid-template-columns:1fr 1fr;}
@media(max-width:500px){.choices{grid-template-columns:1fr;}}
.ch{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:13px 16px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.5;}
.ch:hover{border-color:var(--purple);background:#1c1c2c;transform:translateX(3px);}
.ch:active{transform:translateX(1px) scale(.99);}
.ch.sc{border-color:var(--goldd);}
.ch.sc:hover{border-color:var(--gold);background:#1a1500;}
.ch-lbl{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px;}

.result{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:24px;margin:14px 0;text-align:center;animation:fi .25s ease;}
@keyframes fi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.result.show{display:block;}
.rv{font-family:'Black Han Sans',sans-serif;font-size:30px;margin-bottom:6px;}
.rv.s{color:var(--pb)}.rv.c{color:var(--red)}.rv.gold{color:var(--gold)}
.rd{font-size:14px;margin-bottom:6px;}
.rf{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:20px;line-height:1.7;}
.nb{background:var(--purple);border:none;border-radius:4px;color:#fff;font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:2px;padding:11px 30px;cursor:pointer;transition:all .15s;}
.nb:hover{background:var(--pb);transform:scale(1.04);}

.st-seq{display:none;}
.st-seq.show{display:block;}
.st-blk{padding:28px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin:14px 0;}
.sline{font-size:15px;line-height:2.1;color:var(--text);opacity:0;transform:translateY(6px);transition:opacity .7s ease,transform .7s ease;display:block;margin-bottom:2px;}
.sline.vis{opacity:1;transform:translateY(0);}
.sline.em{color:var(--gold);font-size:17px;}
.sline.red{color:var(--red);}
.sline.pur{color:var(--pb);font-style:italic;}
.sline.big{font-family:'Black Han Sans',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);}
.sline.sm{font-size:12px;letter-spacing:1px;color:var(--muted);font-style:italic;}
.sline.mono{font-family:monospace;font-size:13px;color:var(--pb);}

.end{display:none;background:var(--bg2);border:1px solid var(--gold);border-radius:4px;padding:44px 32px;margin:14px 0;text-align:center;}
.end.show{display:block;}.end.bad{border-color:var(--red);}
.e-title{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--gold);letter-spacing:4px;animation:br 2.5s infinite;}
.end.bad .e-title{color:var(--red);animation:none;}
@keyframes br{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.e-art{font-family:monospace;font-size:12px;line-height:1.5;margin:18px 0;color:var(--pb);}
.e-sub{font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:20px;}
.e-stats{font-size:15px;line-height:2.2;color:var(--text);margin-bottom:28px;}
.restbtn{background:transparent;border:1px solid var(--gold);border-radius:4px;color:var(--gold);font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:2px;padding:11px 30px;cursor:pointer;transition:all .15s;}
.restbtn:hover{background:var(--gold);color:var(--bg);}
.end.bad .restbtn{border-color:var(--red);color:var(--red);}
.end.bad .restbtn:hover{background:var(--red);color:var(--bg);}
.end.shame{border-color:#ff6a00;animation:shamePulse 1s infinite;}
@keyframes shamePulse{0%,100%{border-color:#ff6a00;box-shadow:0 0 0px #ff6a0000}50%{border-color:#ff3300;box-shadow:0 0 18px #ff330044}}
.end.shame .e-title{color:#ff6a00;font-size:38px;letter-spacing:2px;animation:shameTxt 0.8s infinite;}
@keyframes shameTxt{0%,100%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.04) rotate(-1deg)}75%{transform:scale(1.04) rotate(1deg)}}
.shame-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0;}
.shame-tag{background:var(--redd);border:1px solid var(--red);border-radius:3px;padding:4px 12px;font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:2px;color:var(--red);}

.ticker{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;text-align:center;margin-top:28px;padding-top:18px;border-top:1px solid var(--border);}
.shake{animation:shk .4s ease;}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="pop-layer" id="popLayer"></div>

<!-- AUDIO ENGINE -->
<audio id="bgm" loop>
  <source src="aura.mp3" type="audio/mpeg">
</audio>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-t">AURA MONSTER</div>
    <div class="hdr-s">sigma aura farming simulator · re:zero edition</div>
  </div>

  <div class="aura-box" id="auraBox">
    <div class="a-lbl">aura points</div>
    <div class="a-num" id="aNum">0</div>
    <div class="a-rank" id="aRank">⊹ AURA PEASANT ⊹</div>
    <div class="prog-w"><div class="prog-b" id="pBar" style="width:3%"></div></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="sv" id="stR">1</div><div class="sl2">round</div></div>
    <div class="stat"><div class="sv" id="stS">0</div><div class="sl2">mosse sigma</div></div>
    <div class="stat"><div class="sv" id="stC">0</div><div class="sl2">fallimenti</div></div>
  </div>

  <div class="card" id="mainCard">
    <div class="c-tag" id="cTag">— SITUAZIONE —</div>
    <div class="c-txt" id="cTxt"></div>
    <div class="choices" id="choicesBox"></div>
  </div>

  <div class="result" id="resultBox">
    <div class="rv" id="rV"></div>
    <div class="rd" id="rD"></div>
    <div class="rf" id="rF"></div>
    <button class="nb" onclick="nextRound()">PROSSIMA SITUAZIONE →</button>
  </div>

  <div class="st-seq" id="stSeq">
    <div class="st-blk" id="stBlk"></div>
  </div>

  <div class="end" id="endScr">
    <div class="e-title" id="eT"></div>
    <div class="e-art" id="eA"></div>
    <div class="e-sub" id="eS"></div>
    <div class="e-stats" id="eSt"></div>
    <button class="restbtn" onclick="restart()">↺ RICOMINCIA</button>
  </div>

  <div class="ticker">✦ NON ME NE FREGA UN CAZZO ✦ AURA ONLY ✦ SIGMA CERTIFIED ✦ LE SCALE ASPETTANO ✦ RE:ZERO ✦</div>
</div>

<!-- AUDIO BAR -->
<div class="audio-bar">
  <button id="playBtn" onclick="toggleAudio()">▶ PLAY</button>
  <div class="audio-info">♫ aura.mp3 — colonna sonora ufficiale</div>
  <div class="vol-wrap">
    <span class="vol-lbl">vol</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.4" oninput="setVol(this.value)">
  </div>
</div>

<script>
/* ══════════ AUDIO ══════════ */
const bgm = document.getElementById('bgm');
bgm.volume = 0.4;
let audioStarted = false;

function toggleAudio() {
  if (bgm.paused) {
    bgm.play().then(() => {
      document.getElementById('playBtn').textContent = '⏸ PAUSA';
      document.getElementById('playBtn').classList.add('active');
      audioStarted = true;
    }).catch(() => {
      document.getElementById('playBtn').textContent = '⚠ CARICA MP3';
    });
  } else {
    bgm.pause();
    document.getElementById('playBtn').textContent = '▶ PLAY';
    document.getElementById('playBtn').classList.remove('active');
  }
}

function setVol(v) { bgm.volume = v; }

// Autoplay on first interaction
document.addEventListener('click', () => {
  if (!audioStarted && bgm.paused) {
    bgm.play().then(() => {
      document.getElementById('playBtn').textContent = '⏸ PAUSA';
      document.getElementById('playBtn').classList.add('active');
      audioStarted = true;
    }).catch(() => {});
  }
}, { once: true });

/* ══════════ RANKS ══════════ */
const RANKS = [
  { min:-Infinity, max:-6000, label:"☠ NPC ASSOLUTO ☠", cls:"neg" },
  { min:-6000,     max:-2000, label:"▼ CRINGE TOTALE ▼", cls:"neg" },
  { min:-2000,     max:0,     label:"⚠ AURA NEGATIVA ⚠", cls:"neg" },
  { min:0,         max:1500,  label:"⊹ AURA PEASANT ⊹",  cls:"" },
  { min:1500,      max:4000,  label:"◈ AURA APPRENTICE ◈", cls:"" },
  { min:4000,      max:8000,  label:"◆ AURA KNIGHT ◆",   cls:"" },
  { min:8000,      max:13000, label:"✦ AURA LORD ✦",     cls:"" },
  { min:13000,     max:20000, label:"⬡ AURA OVERLORD ⬡", cls:"elite" },
  { min:20000,     max:Infinity, label:"⚡ AURA MONSTER ⚡", cls:"elite" },
];

/* ══════════ POOL — 30+ scenari menefreghisti e anomali ══════════ */
const POOL = [

  /* ── 1 ── */
  { tag:"— SITUAZIONE COSMICA —",
    text:'Un <strong>meteorite grosso come una Punto</strong> sta per cadere nel tuo quartiere. Le autorità ti avvisano di evacuare.',
    choices:[
      { text:"Non mi muovo. Finisco prima la pizza.",                                            sigma:true,  aura:2500, verdict:"COSMICAMENTE MENEFREGHISTA", flavor:"Il meteorite ha cambiato traiettoria per il rispetto." },
      { text:"Mando un messaggio al gruppo: 'qualcuno vuole venire a vedere il meteorite?' Nessuno risponde. Vado da solo.", sigma:true,  aura:1800, verdict:"SIGMA SOLITARIO",            flavor:"La fine del mondo è uno spettacolo. Portarsi le cuffie." },
      { text:"Chiamo il 112 per chiedere conferma tre volte",                                    sigma:false, aura:-700, verdict:"NPC CATASTROFICO",            flavor:"Il 112 ti ha messo in attesa. Il meteorite no." },
      { text:"Cominci a postare stories di Instagram dall'auto in fuga",                          sigma:false, aura:-900, verdict:"CRINGE SIDERALE",             flavor:"Le stories erano in modalità 'solo amici'. Peccato." },
    ]
  },

  /* ── 2 ── */
  { tag:"— SITUAZIONE PROFESSIONALE —",
    text:'Il tuo capo ti dice che sei il <strong>migliore dipendente che abbia mai avuto</strong>. Ti offre un aumento.',
    choices:[
      { text:"'Lo so.' E torni al tuo PC.",                                                      sigma:true,  aura:2200, verdict:"SIGMA PURO",                  flavor:"Non hai detto grazie. Non ne avevi bisogno." },
      { text:"Lo guardi. Aspetti 4 secondi. 'Okay.' Ti alzi e vai in bagno.",                    sigma:true,  aura:1600, verdict:"FREDDO ASSOLUTO",             flavor:"L'aumento era già scontato per te. Lui lo sa ora." },
      { text:"Sorridi, ringrazi effusivamente, fai una battuta imbarazzante",                    sigma:false, aura:-800, verdict:"NPC ENTUSIASTA",              flavor:"Ha riso per cortesia. Non era divertente." },
      { text:"Chiedi subito se puoi avere anche un giorno in più di ferie",                      sigma:false, aura:-600, verdict:"AVIDO NPC",                   flavor:"Hai bruciato la scena più sigma della tua vita lavorativa." },
    ]
  },

  /* ── 3 ── */
  { tag:"— SITUAZIONE EXTRATERRESTRE —",
    text:'Un UFO atterra davanti a casa tua. Un alieno scende e ti fissa. <strong>Aspetta che tu faccia qualcosa.</strong>',
    choices:[
      { text:"Lo ignori e entri in casa. Hai da guardare la serie.",                             sigma:true,  aura:3000, verdict:"INTERGALATTICO SIGMA",         flavor:"L'alieno ha preso nota. Ha riferito al pianeta madre: 'questo non si impressiona'." },
      { text:"Gli offri un caffè. Lui non risponde. Tu lo bevi da solo davanti a lui.",          sigma:true,  aura:2200, verdict:"OSPITALITÀ SIGMA",             flavor:"Non capisci la sua lingua ma capisce il tuo rituale." },
      { text:"Chiami i tuoi amici urlando 'VENITE SUBITO' e aspetti che arrivino",              sigma:false, aura:-700, verdict:"NPC TURISTICO",                flavor:"Quando sono arrivati l'UFO era già partito. Ovviamente." },
      { text:"Inizi a fare video per TikTok invece di vivere il momento",                        sigma:false, aura:-1000, verdict:"CRINGE COSMICO",              flavor:"Nessun filtro era adatto. I video erano sfocati. Ovviamente." },
    ]
  },

  /* ── 4 ── */
  { tag:"— SITUAZIONE MEDICA —",
    text:'Il dottore ti dice che hai <strong>un\'allergia a qualcosa di non specificato</strong>. Non sa cosa sia.',
    choices:[
      { text:"'Okay.' Esci dall'ambulatorio senza altre domande.",                               sigma:true,  aura:1400, verdict:"SIGMA",                       flavor:"L'informazione era inutile. Hai agito di conseguenza." },
      { text:"'Non me ne preoccupo.' Mangi tutto quello che vuoi per testare.",                  sigma:true,  aura:1900, verdict:"SIGMA SCIENTIFICO",            flavor:"Il tuo corpo è il laboratorio. I risultati: nessuna allergia trovata." },
      { text:"Torni tre volte nella settimana successiva a fare analisi",                        sigma:false, aura:-900, verdict:"IPOCONDRIACO NPC",             flavor:"Al terzo accesso il dottore fingeva di non esserti mai stato." },
      { text:"Googli i sintomi per 4 ore e concludi di avere 7 malattie rare",                  sigma:false, aura:-1100, verdict:"CRINGE MEDICO",               flavor:"WebMD ti ha detto che potresti avere la malattia del faraone. Hai creduto." },
    ]
  },

  /* ── 5 ── */
  { tag:"— SITUAZIONE FILOSOFICA —",
    text:'Il tuo filosofo preferito appare in sogno e ti dice che <strong>la tua vita non ha senso</strong>. Ti svegli.',
    choices:[
      { text:"'Lo sapevo già.' Ti rigiri e dormi di nuovo.",                                     sigma:true,  aura:1700, verdict:"SIGMA NIETZSCHIANO",           flavor:"Non ti serviva un filosofo per dirtelo. Ma apprezzavi la compagnia." },
      { text:"Scrivi 'giusto' sul telefono come nota. Torni a dormire.",                         sigma:true,  aura:1200, verdict:"FREDDO ESISTENZIALE",          flavor:"La nota era per ricordartelo. Non te ne sei ricordato. Non importava." },
      { text:"Resti sveglio a fare meditazione guidata su YouTube per 3 ore",                   sigma:false, aura:-800, verdict:"NPC SPIRITUALE",               flavor:"Il video aveva 200 visualizzazioni. Eri nei peggiori 200." },
      { text:"Mandi un messaggio al gruppo 'ho avuto una crisi esistenziale lol'",              sigma:false, aura:-600, verdict:"CRINGE FILOSOFICO",            flavor:"Tre persone hanno reagito con ❤️ senza leggere." },
    ]
  },

  /* ── 6 ── */
  { tag:"— SITUAZIONE CULINARIA ANOMALA —",
    text:'Al ristorante ti portano un piatto che <strong>non hai ordinato e non sai cos\'è</strong>. Sembra ottimo.',
    choices:[
      { text:"Lo mangi senza chiedere. Era buono. Non saprai mai cosa fosse.",                   sigma:true,  aura:2000, verdict:"SIGMA GASTRONAUTA",            flavor:"L'ignoranza era intenzionale. Il piatto era perfetto." },
      { text:"Lo fotografi. Lo mangi. Posti la foto senza caption.",                             sigma:true,  aura:1100, verdict:"MISTERIOSO",                  flavor:"Nessuno ha capito cosa fosse. Meglio così." },
      { text:"Chiami il cameriere per chiedere cosa sia, poi chiedi se puoi tenerlo",           sigma:false, aura:-400, verdict:"INDECISO NPC",                flavor:"Hai rovinato il mistero con una domanda di troppo." },
      { text:"Dici 'scusate, questo non l'ho ordinato io' e lo rispedisci indietro",            sigma:false, aura:-900, verdict:"CRINGE GASTRONOMICO",          flavor:"Era un regalo dello chef. Ora lo chef ti odia." },
    ]
  },

  /* ── 7 ── */
  { tag:"— SITUAZIONE METEOROLOGICA ESTREMA —",
    text:'Un fulmine cade a <strong>tre metri da te</strong>. Sei illeso. La gente intorno urla.',
    choices:[
      { text:"Continui a camminare come se non fosse successo niente.",                          sigma:true,  aura:3500, verdict:"FULMINATO E FREGATO ZERO",     flavor:"Il fulmine ha sbagliato bersaglio. Lo sapeva." },
      { text:"Guardi il punto dove è caduto. Annuisci. Vai avanti.",                             sigma:true,  aura:2500, verdict:"SIGMA ELETTRICO",             flavor:"L'annuire era un saluto. Il fulmine non ha risposto. Rispettoso." },
      { text:"Ti metti a urlare insieme alla gente anche se stai bene",                         sigma:false, aura:-800, verdict:"NPC COLLETTIVO",              flavor:"Stavi bene. L'urlo era social. Triste." },
      { text:"Chiami subito qualcuno per raccontarglielo con voce tremante",                    sigma:false, aura:-600, verdict:"CRINGE TEMPORALESCO",          flavor:"La voce tremante era esagerata. Stavi benissimo." },
    ]

      { text:"Sali. Un gradino alla volta. Non ti guardi indietro.",                           sigma:true,  aura:9999, verdict:"AURA MONSTER", flavor:"La tua aura era più grande. Lo sapevi prima di iniziare.",           isWin:true },
      { text:"Respiri. Aspetti che l'aura si assesti. Poi sali in silenzio.",                  sigma:true,  aura:7500, verdict:"AURA LORD",    flavor:"La pazienza era potere. Hai usato entrambi.",                       isWin:true },
      { text:"Guardi le scale. Decidi che non è il giorno giusto. Torni a casa.",             sigma:false, aura:-3000, verdict:"VIGLIACCERIA", flavor:"Le scale non si spostano. Ma la tua aura sì. Verso il basso." },

/* ══════════ GAME STATE ══════════ */
let gs = { aura:0, round:1, sigma:0, cringe:0, queue:[] };

function buildQueue() {
  const normal = POOL.filter(s => !s.isStairs);
  const stairs = POOL.find(s => s.isStairs);
  return [...normal.sort(()=>Math.random()-.5).slice(0,10), stairs];
}

function getRank(a) { return RANKS.find(r=>a>=r.min&&a<r.max)||RANKS[RANKS.length-1]; }

function updateHUD() {
  const r = getRank(gs.aura);
  document.getElementById('aNum').textContent = gs.aura.toLocaleString('it-IT');
  document.getElementById('aNum').className = 'a-num '+(r.cls||'');
  document.getElementById('aRank').textContent = r.label;
  document.getElementById('aRank').style.color = r.cls==='elite'?'var(--gold)':r.cls==='neg'?'var(--red)':'var(--pb)';
  const box = document.getElementById('auraBox');
  box.className = 'aura-box '+(r.cls||'');
  const pct = Math.min(100,Math.max(2,(gs.aura/20000)*100));
  const bar = document.getElementById('pBar');
  bar.style.width = pct+'%';
  bar.className = 'prog-b '+(r.cls||'');
  document.getElementById('stR').textContent = gs.round;
  document.getElementById('stS').textContent = gs.sigma;
  document.getElementById('stC').textContent = gs.cringe;
}

function spawnPop(text, cls, x, y) {
  const el = document.createElement('div');
  el.className = 'pop '+cls;
  el.textContent = text;
  el.style.left = x+'px';
  el.style.top = y+'px';
  document.getElementById('popLayer').appendChild(el);
  setTimeout(()=>el.remove(),1700);
}

function showScenario(s) {
  document.getElementById('resultBox').className = 'result';
  document.getElementById('stSeq').className = 'st-seq';
  const card = document.getElementById('mainCard');
  card.style.display = '';
  card.className = s.isStairs ? 'card sc' : 'card';
  const tag = document.getElementById('cTag');
  tag.textContent = s.tag;
  tag.className = s.isStairs ? 'c-tag gold' : 'c-tag';
  document.getElementById('cTxt').innerHTML = s.text.replace(/\n/g,'<br>');
  const box = document.getElementById('choicesBox');
  box.innerHTML = '';
  [...s.choices].sort(()=>Math.random()-.5).forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'ch'+(s.isStairs?' sc':'');
    btn.innerHTML = `<span class="ch-lbl">Scelta ${String.fromCharCode(65+i)}</span>${c.text}`;
    btn.onclick = e => pick(c,e);
    box.appendChild(btn);
  });
}

async function pick(choice, e) {
  document.getElementById('choicesBox').innerHTML = '';
  const rect = e.currentTarget.getBoundingClientRect();
  const px = rect.left+rect.width/2, py = rect.top;
  if(choice.sigma){ gs.sigma++; spawnPop('+'+choice.aura.toLocaleString('it-IT'),choice.aura>5000?'h':'g',px,py); }
  else { gs.cringe++; spawnPop(choice.aura.toLocaleString('it-IT'),'l',px,py); }
  gs.aura += choice.aura;
  updateHUD();

  if(choice.isWin){
    document.getElementById('mainCard').style.display='none';
    if(gs.aura >= 20000){ await runStairs(true); showEnd(true); }
    else { await runStairsShame(); showShame(); }
    return;
  }
  if(!choice.sigma&&choice.aura<=-2000){ document.getElementById('auraBox').classList.add('shake'); setTimeout(()=>document.getElementById('auraBox').classList.remove('shake'),500); }
  if(gs.aura<=-9000){ showEnd(false); return; }
  if(choice.isStairs&&!choice.isWin){ document.getElementById('mainCard').style.display='none'; await runStairs(false); showEnd(false); return; }
  showResult(choice);
}

function showResult(choice) {
  const box = document.getElementById('resultBox');
  const v = document.getElementById('rV');
  v.textContent = choice.verdict;
  v.className = 'rv '+(choice.sigma?(choice.aura>5000?'gold':'s'):'c');
  const d = document.getElementById('rD');
  d.textContent = (choice.aura>=0?'+':'')+choice.aura.toLocaleString('it-IT')+' aura';
  d.style.color = choice.aura>=0?'var(--pb)':'var(--red)';
  document.getElementById('rF').textContent = '"'+choice.flavor+'"';
  box.className = 'result show';
}

function nextRound() {
  gs.round++;
  gs.queue.shift();
  if(!gs.queue.length){ showEnd(gs.aura>0); return; }
  showScenario(gs.queue[0]);
}

  document.getElementById('stSeq').className = 'st-seq';
  document.getElementById('mainCard').style.display = 'none';
  document.getElementById('resultBox').className = 'result';
  const end = document.getElementById('endScr');
  end.className = won ? 'end show' : 'end show bad';
  document.getElementById('eT').textContent = won ? 'AURA MONSTER' : 'AURA MORTA';
  document.getElementById('eA').innerHTML = won
    ? '⚡ &nbsp;&nbsp;&nbsp; ⚡<br>( ◣_◢ )<br>&nbsp;|████|<br>/|████|\\<br>&nbsp;SIGMA'
    : '( ×_× )<br>&nbsp;|____|<br>game over';

    : 'la tua aura non esiste più';
  document.getElementById('eSt').innerHTML =
    `Aura finale: <span style="color:${won?'var(--gold)':'var(--red)'}">${gs.aura.toLocaleString('it-IT')}</span><br>`+

function restart() {
  gs = { aura:0, round:1, sigma:0, cringe:0, queue: buildQueue() };
  document.getElementById('endScr').className = 'end';
  document.getElementById('mainCard').style.display = '';
  updateHUD();
  showScenario(gs.queue[0]);
}
